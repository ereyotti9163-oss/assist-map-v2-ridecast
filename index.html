<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDECAST - 実線表示版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100vh; width: 100vw; }
        /* 凡例やボタンなどのスタイルが必要な場合はここに追加 */
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // 1. 地図の初期化（八幡市男山付近を中心に設定）
        const map = L.map('map').setView([34.88, 135.70], 13);

        // 2. 自転車専用地図（CyclOSM）の読み込み
        // これにより、サイクリングロードが「波線」ではなく「はっきりした実線」で表示されます。
        const cyclOSM = L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: '<a href="https://github.com/cyclosm/cyclosm-cartocss-style/releases" title="CyclOSM - Open Bicycle Render">CyclOSM</a> | Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // 3. 風向表示などのRIDECAST固有のスクリプト（以前のコードがある場合はここから下に追記してください）
        // ※もしAPIキーが必要な気象データ連携などがある場合は、以前のコードの該当部分をこちらに移植してください。

        // 現在地取得（モバイル利用時用）
        map.locate({setView: true, maxZoom: 15});
        function onLocationFound(e) {
            L.marker(e.latlng).addTo(map).bindPopup("現在地").openPopup();
        }
        map.on('locationfound', onLocationFound);
    </script>
</body>
</html>
